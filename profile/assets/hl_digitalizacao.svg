<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 253 70" width="253" height="70">
  <!-- Fundo obsidiana -->
  <rect width="253" height="70" fill="#0B0B0D"/>

  <!-- Ticks de canto em sangue -->
  <line x1="0" y1="0" x2="8" y2="0" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="0" y1="0" x2="0" y2="8" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="253" y1="0" x2="245" y2="0" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="253" y1="0" x2="253" y2="8" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="0" y1="70" x2="8" y2="70" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="0" y1="70" x2="0" y2="62" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="253" y1="70" x2="245" y2="70" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="253" y1="70" x2="253" y2="62" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>

  <!-- Ícone digitalização: fluxo analógico→digital -->
  <g transform="translate(15, 19)">
    <!-- Bloco analógico -->
    <rect x="0" y="8" width="11" height="14" fill="none" stroke="#4A4A50" stroke-width="1.5" stroke-linecap="square"/>
    <line x1="2" y1="12" x2="9" y2="12" stroke="#4A4A50" stroke-width="1" stroke-linecap="square"/>
    <line x1="2" y1="15" x2="9" y2="15" stroke="#4A4A50" stroke-width="1" stroke-linecap="square"/>
    <line x1="2" y1="18" x2="6" y2="18" stroke="#4A4A50" stroke-width="1" stroke-linecap="square"/>
    <!-- Seta transformação sangue -->
    <line x1="13" y1="15" x2="19" y2="15" stroke="#8B0F14" stroke-width="1.5" stroke-linecap="square"/>
    <polygon points="17,12 21,15 17,18" fill="#8B0F14"/>
    <!-- Bloco digital -->
    <rect x="22" y="8" width="11" height="14" fill="none" stroke="#8B0F14" stroke-width="1.5" stroke-linecap="square"/>
    <text x="24" y="16" font-family="'JetBrains Mono', monospace" font-size="5" fill="#8B0F14">01</text>
    <text x="24" y="20" font-family="'JetBrains Mono', monospace" font-size="5" fill="#8B0F14">10</text>
    <!-- Ponto ativo -->
    <rect x="11" y="4" width="3" height="3" fill="#8B0F14"/>
  </g>

  <!-- Linha separadora vertical -->
  <line x1="58" y1="14" x2="58" y2="56" stroke="#2A2A2E" stroke-width="1" stroke-linecap="square"/>

  <!-- Eyebrow -->
  <text x="66" y="26" font-family="'JetBrains Mono', monospace" font-size="9" fill="#4A4A50" letter-spacing="1.8">IA · HORSE LABS</text>

  <!-- Linha 1: "Digitalização de processos" -->
  <text x="66" y="42" font-family="'Instrument Serif', 'Times New Roman', serif" font-size="14" fill="#F2EFE8" letter-spacing="-0.2">Digitalização de processos</text>
  <!-- Linha 2: "com" normal + "IA" italic sangue -->
  <text x="66" y="57" font-family="'Instrument Serif', 'Times New Roman', serif" font-size="14" fill="#F2EFE8" letter-spacing="-0.2">com <tspan font-style="italic" fill="#8B0F14">IA</tspan></text>

  <!-- Linha de acento -->
  <line x1="66" y1="63" x2="104" y2="63" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="104" y1="63" x2="240" y2="63" stroke="#2A2A2E" stroke-width="1" stroke-linecap="square"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 253 70" width="253" height="70">
  <!-- Fundo obsidiana -->
  <rect width="253" height="70" fill="#0B0B0D"/>

  <!-- Ticks de canto em sangue -->
  <line x1="0" y1="0" x2="8" y2="0" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="0" y1="0" x2="0" y2="8" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="253" y1="0" x2="245" y2="0" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="253" y1="0" x2="253" y2="8" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="0" y1="70" x2="8" y2="70" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="0" y1="70" x2="0" y2="62" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="253" y1="70" x2="245" y2="70" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="253" y1="70" x2="253" y2="62" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>

  <!-- Ícone serviço/API: nó central com 3 conexões (Sistema II) -->
  <g transform="translate(16, 18)">
    <!-- Nó central ativo: sangue -->
    <rect x="10" y="13" width="10" height="10" fill="#8B0F14" stroke="none"/>
    <!-- Nó left -->
    <rect x="0" y="4" width="7" height="7" fill="none" stroke="#B8B5AE" stroke-width="1.5" stroke-linecap="square"/>
    <!-- Nó right -->
    <rect x="22" y="4" width="7" height="7" fill="none" stroke="#B8B5AE" stroke-width="1.5" stroke-linecap="square"/>
    <!-- Nó bottom -->
    <rect x="10" y="26" width="9" height="7" fill="none" stroke="#B8B5AE" stroke-width="1.5" stroke-linecap="square"/>
    <!-- Linhas conectoras -->
    <line x1="7" y1="7" x2="10" y2="14" stroke="#4A4A50" stroke-width="1" stroke-linecap="square"/>
    <line x1="22" y1="7" x2="20" y2="14" stroke="#4A4A50" stroke-width="1" stroke-linecap="square"/>
    <line x1="15" y1="23" x2="14" y2="26" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
    <!-- Seta output (sangue) -->
    <polygon points="12,25 15,21 18,25" fill="#8B0F14"/>
  </g>

  <!-- Linha separadora vertical -->
  <line x1="58" y1="14" x2="58" y2="56" stroke="#2A2A2E" stroke-width="1" stroke-linecap="square"/>

  <!-- Eyebrow -->
  <rect x="66" y="16" width="88" height="11" fill="#0B0B0D"/>
  <text x="66" y="26" font-family="'JetBrains Mono', monospace" font-size="9" fill="#4A4A50" letter-spacing="1.8" text-anchor="start">IA · HORSE LABS</text>

  <!-- Título -->
  <text x="66" y="44" font-family="'Instrument Serif', 'Times New Roman', serif" font-size="18" fill="#F2EFE8" letter-spacing="-0.3" text-anchor="start">IA como</text>
  <text x="139" y="44" font-family="'Instrument Serif', 'Times New Roman', serif" font-size="18" fill="#8B0F14" letter-spacing="-0.3" font-style="italic" text-anchor="start"> serviço</text>

  <!-- Linha de acento -->
  <line x1="66" y1="54" x2="100" y2="54" stroke="#8B0F14" stroke-width="1" stroke-linecap="square"/>
  <line x1="100" y1="54" x2="240" y2="54" stroke="#2A2A2E" stroke-width="1" stroke-linecap="square"/>
</svg>
